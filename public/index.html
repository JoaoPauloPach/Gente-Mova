<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mova — Agente de Movimentação de Pessoal</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 780px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #fff;
      box-shadow: 0 2px 20px rgba(0,0,0,0.08);
    }

    /* Header */
    .header {
      background: #1a2e4a;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-avatar {
      width: 40px;
      height: 40px;
      background: #e86b2a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      flex-shrink: 0;
    }

    .header-info h1 { font-size: 16px; font-weight: 600; }
    .header-info p { font-size: 12px; opacity: 0.7; margin-top: 2px; }

    .header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .header-btn:hover { background: rgba(255,255,255,0.2); }

    /* API Key banner */
    .api-key-banner {
      background: #fff8e1;
      border-bottom: 1px solid #ffe082;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #5d4037;
    }

    .api-key-banner.configured {
      background: #e8f5e9;
      border-color: #a5d6a7;
      color: #2e7d32;
    }

    .api-key-banner input {
      flex: 1;
      border: 1px solid #ffe082;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
      outline: none;
      font-family: monospace;
    }

    .api-key-banner input:focus { border-color: #e86b2a; }

    .api-key-banner button {
      background: #e86b2a;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }

    .api-key-banner button:hover { background: #c95c22; }

    .api-key-status {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
    }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 85%;
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message.assistant { align-self: flex-start; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .message.assistant .avatar { background: #e86b2a; color: #fff; }
    .message.user .avatar { background: #1a2e4a; color: #fff; }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .message.assistant .bubble {
      background: #f0f2f5;
      border-bottom-left-radius: 4px;
      color: #1a1a1a;
    }

    .message.assistant .bubble p { margin-bottom: 8px; }
    .message.assistant .bubble p:last-child { margin-bottom: 0; }
    .message.assistant .bubble ul, .message.assistant .bubble ol { padding-left: 20px; margin-bottom: 8px; }
    .message.assistant .bubble li { margin-bottom: 4px; }
    .message.assistant .bubble strong { font-weight: 600; }
    .message.assistant .bubble h1, .message.assistant .bubble h2, .message.assistant .bubble h3 { margin-bottom: 6px; font-size: 14px; }

    .message.user .bubble {
      background: #1a2e4a;
      border-bottom-right-radius: 4px;
      color: #fff;
    }

    /* Typing indicator */
    .typing .bubble {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 14px 16px;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #999;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Suggestions */
    .suggestions {
      padding: 0 20px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .suggestion {
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      color: #1a2e4a;
      transition: all 0.15s;
    }

    .suggestion:hover {
      background: #1a2e4a;
      color: #fff;
      border-color: #1a2e4a;
    }

    /* Input */
    .input-area {
      padding: 16px 20px;
      border-top: 1px solid #e8eaed;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      border: 1px solid #d0d7de;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      resize: none;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
      max-height: 120px;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: #1a2e4a; }

    button.send {
      background: #e86b2a;
      color: #fff;
      border: none;
      border-radius: 12px;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    button.send:hover { background: #c95c22; }
    button.send:disabled { background: #ccc; cursor: not-allowed; }

    button.send svg { width: 20px; height: 20px; }

    /* Welcome */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }

    .welcome h2 { font-size: 20px; color: #1a2e4a; margin-bottom: 8px; }
    .welcome p { font-size: 14px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-avatar">M</div>
    <div class="header-info">
      <h1>Mova</h1>
      <p>Agente de Movimentação de Pessoal · LG lugar de gente</p>
    </div>
    <div class="header-actions">
      <button class="header-btn" onclick="toggleKeyBanner()">🔑 API Key</button>
      <button class="header-btn" onclick="resetSession()">↺ Nova sessão</button>
    </div>
  </div>

  <!-- Banner de configuração da API Key -->
  <div class="api-key-banner" id="keyBanner">
    <span>🔑</span>
    <input type="password" id="keyInput" placeholder="Cole sua Gemini API Key aqui (AIza...)" />
    <button onclick="saveKey()">Salvar</button>
  </div>

  <div class="messages" id="messages">
    <div class="welcome">
      <h2>Olá! Eu sou o Mova 👋</h2>
      <p>Diga o que precisa em linguagem natural.<br/>Cuido das movimentações dos seus colaboradores.</p>
    </div>
  </div>

  <div class="suggestions" id="suggestions">
    <button class="suggestion" onclick="sendSuggestion(this)">Quero promover a Maria Silva</button>
    <button class="suggestion" onclick="sendSuggestion(this)">Dar 8% de mérito para os Analistas do CC 0450</button>
    <button class="suggestion" onclick="sendSuggestion(this)">Tenho aprovações pendentes?</button>
    <button class="suggestion" onclick="sendSuggestion(this)">Qual o impacto no custo do CC 0450?</button>
  </div>

  <div class="input-area">
    <textarea
      id="input"
      rows="1"
      placeholder="Digite sua instrução aqui..."
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
  let sessionId = null;
  let isLoading = false;

  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("sendBtn");
  const suggestionsEl = document.getElementById("suggestions");
  const keyBanner = document.getElementById("keyBanner");
  const keyInput = document.getElementById("keyInput");

  // Carrega chave salva no localStorage
  function loadKey() {
    const saved = localStorage.getItem("gemini_api_key");
    if (saved) {
      keyInput.value = saved;
      setKeyConfigured(true);
    }
  }

  function saveKey() {
    const input = document.getElementById("keyInput");
    const key = input ? input.value.trim() : "";
    if (!key) return alert("Informe uma API Key válida.");
    localStorage.setItem("gemini_api_key", key);
    setKeyConfigured(true);
    keyBanner.style.display = "none";
  }

  function setKeyConfigured(configured) {
    if (configured) {
      keyBanner.className = "api-key-banner configured";
      keyBanner.innerHTML = `
        <div class="api-key-status">
          <span>✅</span>
          <span>API Key configurada</span>
        </div>
        <button onclick="clearKey()">Trocar chave</button>
      `;
      keyBanner.style.display = "none";
    }
  }

  function clearKey() {
    localStorage.removeItem("gemini_api_key");
    keyBanner.className = "api-key-banner";
    keyBanner.innerHTML = `
      <span>🔑</span>
      <input type="password" id="keyInput" placeholder="Cole sua Gemini API Key aqui (AIza...)" />
      <button onclick="saveKey()">Salvar</button>
    `;
    keyBanner.style.display = "flex";
  }

  function toggleKeyBanner() {
    keyBanner.style.display = keyBanner.style.display === "none" ? "flex" : "none";
  }

  function getKey() {
    return localStorage.getItem("gemini_api_key") || "";
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 120) + "px";
  }

  function addMessage(role, text) {
    const welcome = messagesEl.querySelector(".welcome");
    if (welcome) welcome.remove();

    const wrap = document.createElement("div");
    wrap.className = `message ${role}`;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "user" ? "G" : "M";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    if (role === "assistant") {
      bubble.innerHTML = marked.parse(text);
    } else {
      bubble.textContent = text;
    }

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap;
  }

  function showTyping() {
    const wrap = document.createElement("div");
    wrap.className = "message assistant typing";
    wrap.id = "typing";

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = "M";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function sendMessage() {
    const msg = inputEl.value.trim();
    if (!msg || isLoading) return;

    const apiKey = getKey();
    if (!apiKey) {
      keyBanner.style.display = "flex";
      alert("Configure sua Gemini API Key antes de enviar mensagens.");
      return;
    }

    suggestionsEl.style.display = "none";
    isLoading = true;
    sendBtn.disabled = true;
    inputEl.value = "";
    inputEl.style.height = "auto";

    addMessage("user", msg);
    showTyping();

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg, session_id: sessionId, api_key: apiKey }),
      });

      const data = await res.json();
      removeTyping();

      if (data.error) {
        addMessage("assistant", "Ops, ocorreu um erro: " + data.error);
      } else {
        sessionId = data.session_id;
        addMessage("assistant", data.reply);
      }
    } catch (err) {
      removeTyping();
      addMessage("assistant", "Erro de conexão. Verifique se o servidor está rodando.");
    }

    isLoading = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }

  function sendSuggestion(btn) {
    inputEl.value = btn.textContent;
    sendMessage();
  }

  async function resetSession() {
    if (!confirm("Reiniciar a conversa?")) return;
    await fetch("/api/reset", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: sessionId }),
    });
    sessionId = null;
    messagesEl.innerHTML = `
      <div class="welcome">
        <h2>Olá! Eu sou o Mova 👋</h2>
        <p>Diga o que precisa em linguagem natural.<br/>Cuido das movimentações dos seus colaboradores.</p>
      </div>`;
    suggestionsEl.style.display = "flex";
  }

  // Inicializa
  loadKey();
</script>
</body>
</html>
